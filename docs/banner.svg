<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c8a5b"/>
      <stop offset="0.62" stop-color="#0a6f49"/>
      <stop offset="1" stop-color="#084a32"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#9bf3c9"/>
      <stop offset="1" stop-color="#9bf3c9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" rx="20" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.06">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200"/>
    <path d="M150 0 V340 M350 0 V340 M550 0 V340 M750 0 V340 M950 0 V340"/>
  </g>

  <!-- decorative rising chart -->
  <g opacity="0.9">
    <polyline points="760,250 830,215 890,235 955,170 1015,190 1085,120 1140,140"
      fill="none" stroke="#9bf3c9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="760,250 830,215 890,235 955,170 1015,190 1085,120 1140,140 1140,290 760,290" fill="url(#spark)" opacity="0.28"/>
    <circle cx="1085" cy="120" r="6" fill="#eafff5"/>
  </g>

  <!-- document glyph -->
  <g transform="translate(78,110)" opacity="0.95">
    <rect x="0" y="0" width="92" height="118" rx="10" fill="#ffffff" opacity="0.12"/>
    <rect x="0" y="0" width="92" height="118" rx="10" fill="none" stroke="#bdfbe0" stroke-width="2"/>
    <g stroke="#bdfbe0" stroke-width="5" stroke-linecap="round">
      <path d="M18 30 H74"/><path d="M18 50 H74"/><path d="M18 70 H58"/><path d="M18 90 H66"/>
    </g>
  </g>

  <text x="210" y="150" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="-1">FilingsIQ</text>
  <text x="212" y="196" fill="#c8f3e0" font-size="23" font-weight="600">Retrieval-Augmented Intelligence for SEC Filings</text>
  <text x="212" y="232" fill="#9bd8be" font-size="16">Ask an annual report anything — get fast, grounded, citation-backed answers.</text>

  <!-- badges -->
  <g font-size="13.5" font-weight="600">
    <g transform="translate(212,258)">
      <rect width="150" height="30" rx="15" fill="#ffffff" fill-opacity="0.16"/>
      <text x="20" y="20" fill="#eafff5">RAG Pipeline</text>
    </g>
    <g transform="translate(372,258)">
      <rect width="132" height="30" rx="15" fill="#ffffff" fill-opacity="0.16"/>
      <text x="18" y="20" fill="#eafff5">Cited Sources</text>
    </g>
    <g transform="translate(514,258)">
      <rect width="170" height="30" rx="15" fill="#ffffff" fill-opacity="0.16"/>
      <text x="18" y="20" fill="#eafff5">Zero Hallucination</text>
    </g>
  </g>
</svg>
